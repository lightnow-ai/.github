<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LightNow — one runtime for every AI client</title>
  <desc id="desc">Discover trusted MCP servers, manage one runtime, and connect every AI client</desc>
  <defs>
